<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Job Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav class="navbar">
        <a href="/" class="brand">
            🚀 Job Tracker
        </a>
        <div class="user-menu">
            <span>Welcome, <strong>{{ username }}</strong></span>
            <a href="/logout" class="btn-logout">Logout</a>
        </div>
    </nav>

    <div class="app-container">
        <!-- Add Application Form -->
        <div class="card">
            <h2>Add New Application</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="company">Company Name</label>
                    <input id="company" type="text" placeholder="e.g. Google, Amazon">
                </div>
                
                <div class="form-group">
                    <label for="role">Role / Position</label>
                    <input id="role" type="text" placeholder="e.g. Software Engineer">
                </div>

                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status">
                        <option value="Applied">Applied</option>
                        <option value="Interview">Interview</option>
                        <option value="Rejected">Rejected</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date Applied</label>
                    <input id="date" type="date">
                </div>

                <div class="form-group">
                    <!-- Empty label to align button -->
                    <label>&nbsp;</label> 
                    <div style="display: flex; gap: 0.5rem;">
                        <button id="submitBtn" onclick="submitForm()" class="btn-primary">Add Application</button>
                        <button id="cancelBtn" onclick="cancelEdit()" class="btn-primary" style="background: var(--text-muted); display: none;">Cancel</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Application List -->
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2 style="margin: 0;">My Applications</h2>
                <div style="display: flex; gap: 10px;">
                    <select id="statusFilter" style="padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px;">
                        <option value="All">All Status</option>
                        <option value="Applied">Applied</option>
                        <option value="Interview">Interview</option>
                        <option value="Rejected">Rejected</option>
                        <option value="Offer">Offer</option>
                    </select>
                    <input type="text" id="searchInput" placeholder="🔍 Search company..." style="width: 250px; padding: 0.5rem 1rem;">
                </div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Company</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
