<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Job Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="auth-container">
    <div class="card auth-card">
        <h2 style="text-align: center; margin-bottom: 1.5rem;">Create Account</h2>

        {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
        {% endif %}

        <form method="post">
            <div class="form-group" style="margin-bottom: 1rem;">
                <label for="username">Username</label>
                <input id="username" name="username" placeholder="Choose a username" required>
            </div>
            
            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="password">Password</label>
                <input id="password" type="password" name="password" placeholder="Choose a strong password" required>
            </div>

            <button class="btn-primary">Register</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/login">Sign In</a>
        </div>
    </div>
</div>

</body>
</html>
